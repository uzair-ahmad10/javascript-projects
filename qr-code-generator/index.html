<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> QR Code Generator </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <H1>QR Code Generator</H1>
        <p>Enter Text, Number or URL to generate your QR instantly</p>

        <div class="input-box">
            <input type="text" placeholder="Enter Text or URL">
            <button class="genBtn">Generate</button>
        </div>

        <div class="qrBox">
            <img src="" alt="" class="qrImg">
        </div>

        <button class="dlBtn">Download</button>



    </div>

    <script src="script.js"> </script>
</body>
</html>
